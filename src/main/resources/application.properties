spring.application.name=college_project

# Database configuration
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=10000

# AWS
cloud.aws.credentials.access-key=${AWS_ACCESS_KEY}
cloud.aws.credentials.secret-key=${AWS_SECRET_KEY}
cloud.aws.region.static=us-east-1

# Reduce startup time on constrained instances
spring.main.lazy-initialization=true
spring.data.jpa.repositories.bootstrap-mode=deferred

# Azure / Microsoft Graph API for OneDrive
azure.client.id=${AZURE_CLIENT_ID}
azure.client.secret=${AZURE_CLIENT_SECRET}
azure.tenant.id=${AZURE_TENANT_ID}
azure.graph.token-url=https://login.microsoftonline.com/${AZURE_TENANT_ID}/oauth2/v2.0/token
azure.graph.scope=https://graph.microsoft.com/.default
onedrive.drive.id=${ONEDRIVE_DRIVE_ID}
onedrive.root.folder=${ONEDRIVE_ROOT_FOLDER:moto-service-hub}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

spring.jackson.default-property-inclusion=non_null

# Mail Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:noreply.moksh.project@gmail.com}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

app.mail.from=${MAIL_FROM:${spring.mail.username}}
app.otp.ttl-minutes=${OTP_TTL_MINUTES:10}
